<!DOCTYPE html>
<html lang="en-us">

  <!--   <script src="">https://unpkg.com</script> -->
  <script src="./TemplateData/vk-bridge.js"></script>
  <script src="./TemplateData/max-web-app.js"></script> <!--   <script src="https://st.max.ru/js/max-web-app.js"></script> -->
  <script src="./TemplateData/telegram-web-app.js"></script>

  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Game</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">
  </head>

  <body style="background-color:black;">
    <script src="./TemplateData/init-apps.js"></script>
    <div id="unity-container" style="position: absolute; width: 100%; height: 100%">
      <canvas id="unity-canvas" width=960 height=600 style="width: 100%; height: 100%; background: url('./TemplateData/bg.png'); background-attachment: fixed; background-size: auto 100%;background-position: center center;" ></canvas>
      <div id="unity-loading-bar">
        <div id="unity-logo">
          <h1  id="progressText" style="color:white; font-size: 41px;text-shadow: 1px 1px 2px #333333;">0%</h1>
        </div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
          <p  id="text" style="line-height: 1;font-family:'lack';color:white; font-size: 18px;display: flex; justify-content: center;text-align: center;  align-items: center;text-shadow: 1px 1px 1px #333333;">Проверяем покрытие…<br> </p>
        </div>
      </div>
      <div id="unity-warning"> </div>
    </div>



    <script>
      var canvas = document.querySelector("#unity-canvas");

      function unityShowBanner(msg, type) {
        var warningBanner = document.querySelector("#unity-warning");
        function updateBannerVisibility() {
          warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
        }
        var div = document.createElement('div');
        div.innerHTML = msg;
        warningBanner.appendChild(div);
        if (type == 'error') div.style = 'background: red; padding: 10px;';
        else {
          if (type == 'warning') div.style = 'background: yellow; padding: 10px;';
          setTimeout(function() {
            warningBanner.removeChild(div);
            updateBannerVisibility();
          }, 5000);
        }
        updateBannerVisibility();
      }

      var buildUrl = "Build";
      var loaderUrl = buildUrl + "/FinalBuild.loader.js";
      var config = {
        arguments: [],
        dataUrl: buildUrl + "/FinalBuild.data",
        frameworkUrl: buildUrl + "/FinalBuild.framework.js",
        codeUrl: buildUrl + "/FinalBuild.wasm",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "Maracoon",
        productName: "PlayGame",
        productVersion: "1",
        showBanner: unityShowBanner,
      };

      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        var meta = document.createElement('meta');
        meta.name = 'viewport';
        meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
        document.getElementsByTagName('head')[0].appendChild(meta);
        document.querySelector("#unity-container").className = "unity-mobile";
        canvas.className = "unity-mobile";
      } else {
        canvas.style.width = "100%";
        canvas.style.height = "100%";
        document.querySelector("#unity-container").style.width = "100%";
        document.querySelector("#unity-container").style.height = "100%";
      }

      document.querySelector("#unity-loading-bar").style.display = "block";

      var script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
            document.querySelector("#unity-progress-bar-full").style.width = progressFloatToInt(100 * progress) + "%";
            document.querySelector("#progressText").textContent  = progressFloatToInt(100 * progress) + "%";
          }).then((instance) => {
                unityInstance = instance;
                document.querySelector("#unity-loading-bar").style.display = "none";
            }).catch((message) => {
                window.location.reload(true);
            });
        };
      document.body.appendChild(script);
      function progressFloatToInt(progr){ var a = Math.floor(progr); if (a>94) a = 94; return a; }


      /// Accelerometer access
      function requestAccessAccelerometer() {
          if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
              DeviceOrientationEvent.requestPermission().then(response => {
                      if (response == 'granted') {
                          window.addEventListener('deviceorientation', handleOrientation);
                      }
              }).catch(console.error);
          } else {
              window.addEventListener('deviceorientation', handleOrientation);
          }
      }
      /// Accelerometer data
      function handleOrientation(event) {
          var tilt = event.gamma / 90;
          if (Math.abs(tilt) > 0.05) {
            if (unityInstance) { unityInstance.SendMessage('Manager', 'AccelerometerData', tilt); }
          }

      }

    </script>
  </body>
</html>
